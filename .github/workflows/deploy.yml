name: Deploy Bot Automatically

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        command_timeout: 10m  # رفعنا المهلة لـ 10 دقائق لمنع الـ Timeout تماماً أثناء تثبيت المكتبات
        script: |
          mkdir -p ~/miixbankdiscord-bot
          cd ~/miixbankdiscord-bot
          
          # تحديث الكود بسرعة
          if [ ! -d ".git" ]; then
            git clone https://github.com/Mimo384/M.Bank.git .
          else
            git fetch origin
            git reset --hard origin/main
          fi
          
          # تثبيت المكتبات السريع بدون كاش ميت
          pip3 install --no-cache-dir -r requirements.txt
          
          # تنظيف العمليات القديمة تماماً
          pkill -f main.py || true
          screen -S DiscordMixBank -X quit || true
          sleep 1
          
          # التشغيل المعزول كلياً (بثق ومغادرة)
          if ! command -v screen &> /dev/null; then
            # إذا لم يكن سكرين مثبتاً نستخدم nohup المعزول تماماً
            nohup python3 main.py > bot.log 2>&1 </dev/null &
          else
            # تشغيل الشاشة وفصلها كلياً عن مجرى الـ SSH الحالية
            screen -L -Logfile bot.log -dmS DiscordMixBank python3 main.py </dev/null >/dev/null 2>&1 &
          fi
          
          echo "Deployment successful!"
          exit 0
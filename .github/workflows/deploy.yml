name: Deploy Bot Automatically

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        command_timeout: 3m # تم رفع الوقت إلى 3 دقائق لضمان عدم حدوث تجميد أو قطع اتصال مبكر
        script: |
          script: |
          cd ~/miixbankdiscord-bot
          git fetch origin
          git reset --hard origin/main
          pip3 install -r requirements.txt
          
          # إنهاء نسخة البوت القديمة لو كانت تعمل
          pkill -f main.py || true
          
          # التشغيل السليم والفصل التام عن جلسة الـ SSH
          nohup python3 main.py > bot.log 2>&1 </dev/null &
          
          # التأكيد على نجاح السكريبت والخروج فوراً
          exit 0
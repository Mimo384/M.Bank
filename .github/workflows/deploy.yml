name: Deploy Bot Automatically

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        command_timeout: 3m
        script: |
          mkdir -p ~/miixbankdiscord-bot
          cd ~/miixbankdiscord-bot
          if [ ! -d ".git" ]; then
            git clone https://github.com/Mimo384/M.Bank.git .
          else
            git fetch origin
            git reset --hard origin/main
          fi
          pip3 install -r requirements.txt
          pkill -f main.py || true
          screen -S DiscordMixBank -X quit || true
          screen -L -Logfile bot.log -dmS DiscordMixBank python3 main.py